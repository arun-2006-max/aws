# Render.com deployment config — single URL for frontend + backend
# Docs: https://render.com/docs/yaml-spec

services:
  - type: web
    name: ai-builder-copilot
    runtime: python
    rootDir: backend
    buildCommand: |
      pip install -r requirements.txt
      cd ../frontend
      npm install
      npm run build
      cp -r build ../backend/build
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false           # Set manually in Render dashboard
      - key: DB_PATH
        value: /opt/render/project/src/backend/data/copilot.db
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: NODE_VERSION
        value: "20"
    disk:
      name: copilot-data
      mountPath: /opt/render/project/src/backend/data
      sizeGB: 1
    healthCheckPath: /health
    plan: free
